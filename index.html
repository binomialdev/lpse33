<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Konstruksi Enterprise</title>

<!-- ✅ jQuery FIX (load paling awal, TANPA defer/async) -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:20px; background:#f5f6fa }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:15px }
button { padding:5px 10px; margin:2px }
table { width:100%; border-collapse: collapse }
th, td { padding:8px; border-bottom:1px solid #ddd }
#popup { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none }
#popup-content { background:white; padding:20px; margin:50px auto; width:70%; border-radius:10px }
</style>
</head>
<body>

<h2>📊 Dashboard Perusahaan Konstruksi</h2>

<div class="card">
Filter Kabupaten:
<select id="filter"></select>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<table id="table">
<thead>
<tr>
<th>View</th>
<th>Kab/Kota</th>
<th>Status</th>
<th>Kode</th>
<th>Nama</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div id="popup">
<div id="popup-content"></div>
</div>

<script>

let perusahaan = [];
let proyek = [];

// ✅ Pastikan jQuery sudah benar-benar ada
if (typeof jQuery === 'undefined') {
    document.getElementById('table').innerHTML = '<tr><td colspan="5">❌ jQuery gagal load</td></tr>';
    throw new Error('jQuery not loaded');
}

$(document).ready(async function(){
    await loadData();
    renderFilter();
    renderTable();
    renderChart();
});

async function loadData(){
    const p1 = fetchSheet('PERUSAHAAN');
    const p2 = fetchSheet('PROYEK');

    const [d1, d2] = await Promise.all([p1,p2]);

    perusahaan = d1;
    proyek = d2;
}

async function fetchSheet(sheet){
    const url = `https://docs.google.com/spreadsheets/d/1H6HMmjpkiEzyuJBJhepfdRPoIW6pVQSBalZRdcVeTZg/gviz/tq?tqx=out:json&sheet=${sheet}`;

    const res = await fetch(url);
    const text = await res.text();

    const json = JSON.parse(text.substring(47).slice(0,-2));

    const cols = json.table.cols.map(c=>c.label);

    return json.table.rows.map(r=>{
        let obj = {};
        r.c.forEach((c,i)=>{
            obj[cols[i]] = c ? c.v : '';
        });
        return obj;
    });
}

function renderFilter(){
    const kab = [...new Set(perusahaan.map(d=>d['Kabupaten/Kota']))];
    $('#filter').append(`<option value="">ALL</option>`);
    kab.forEach(k=>{
        $('#filter').append(`<option>${k}</option>`);
    });

    $('#filter').on('change', ()=>{
        renderTable();
        renderChart();
    });
}

function renderTable(){
    let f = $('#filter').val();

    let data = perusahaan.filter(d=>!f || d['Kabupaten/Kota']==f);

    let html = '';

    data.forEach(d=>{
        html += `<tr>
        <td>
        <button onclick="detail('${d['Kode Penyedia']}')">Detail</button>
        <button onclick="lihatProyek('${d['Kode Penyedia']}')">Proyek</button>
        </td>
        <td>${d['Kabupaten/Kota']}</td>
        <td>${d['Status']}</td>
        <td>${d['Kode Penyedia']}</td>
        <td>${d['Nama Penyedia']}</td>
        </tr>`;
    });

    $('#table tbody').html(html);
}

function detail(kode){
    let d = perusahaan.find(x=>x['Kode Penyedia']==kode);

    let html = `<h3>Detail Perusahaan</h3>`;

    Object.keys(d).forEach(k=>{
        html += `<p><b>${k}</b>: ${d[k]}</p>`;
    });

    showPopup(html);
}

function lihatProyek(kode){
    let data = proyek.filter(p=>p['Kode Penyedia']==kode);

    let grouped = {};

    data.forEach(p=>{
        if(!grouped[p['Kode RUP']]) grouped[p['Kode RUP']] = [];
        grouped[p['Kode RUP']].push(p);
    });

    let html = `<h3>Daftar Proyek</h3>`;

    for(let k in grouped){
        html += `<h4>${k}</h4>`;
        grouped[k].forEach(p=>{
            html += `<p>${p['Nama Paket']} | ${p['nilai_kontrak']}</p>`;
        });
    }

    showPopup(html);
}

function showPopup(html){
    $('#popup-content').html(html + '<br><button onclick="closePopup()">Close</button>');
    $('#popup').show();
}

function closePopup(){
    $('#popup').hide();
}

function renderChart(){
    let f = $('#filter').val();

    let data = perusahaan.filter(d=>!f || d['Kabupaten/Kota']==f);

    let count = {};

    data.forEach(d=>{
        let k = d['Kabupaten/Kota'];
        count[k] = (count[k]||0)+1;
    });

    const ctx = document.getElementById('chart');

    // destroy chart lama biar tidak dobel
if(window.myChart){ window.myChart.destroy(); }
window.myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: Object.keys(count),
            datasets: [{ data: Object.values(count) }]
        }
    });
}

</script>

</body>
</html>
