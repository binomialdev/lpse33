<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Konstruksi</title>

<!-- jQuery -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:20px; background:#f5f6fa }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:15px }
table { width:100%; border-collapse: collapse }
th, td { padding:8px; border-bottom:1px solid #ddd }
button { padding:5px 10px; margin:2px }
.search-box { margin-bottom:10px }
.pagination button { margin-right:5px }
#popup { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none }
#popup-content { background:white; padding:20px; margin:50px auto; width:70%; border-radius:10px }
</style>
</head>

<body>

<h2>📊 Dashboard Perusahaan Konstruksi</h2>

<div class="card">
Filter Kabupaten:
<select id="filter"></select>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<div class="search-box">
<input type="text" id="search" placeholder="Cari nama / kode...">
<button onclick="exportExcel()">Export Excel</button>
</div>

<table id="table">
<thead>
<tr>
<th>View</th>
<th>Kab/Kota</th>
<th>Status</th>
<th>Kode</th>
<th>Nama</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="pagination"></div>
</div>

<div id="popup">
<div id="popup-content"></div>
</div>

<script>

let perusahaan = [];
let proyek = [];
let currentPage = 1;
let pageSize = 10;
let chart;

// INIT
jQuery(document).ready(async function(){
    await loadData();
    renderFilter();
    renderTable();
    renderChart();

    jQuery('#search').on('input', ()=>{
        currentPage = 1;
        renderTable();
    });
});

// LOAD DATA
async function loadData(){
    perusahaan = await fetchSheet('PERUSAHAAN');
    proyek = await fetchSheet('PROYEK');
}

// FETCH GOOGLE SHEET
async function fetchSheet(sheet){
    const url = `https://docs.google.com/spreadsheets/d/1H6HMmjpkiEzyuJBJhepfdRPoIW6pVQSBalZRdcVeTZg/gviz/tq?tqx=out:json&sheet=${sheet}`;
    const res = await fetch(url);
    const text = await res.text();

    const json = JSON.parse(text.substring(47).slice(0,-2));

    const cols = json.table.cols.map(c=>c.label);

    return json.table.rows.map(r=>{
        let obj = {};
        r.c.forEach((c,i)=>{
            obj[cols[i]] = c ? c.v : '';
        });
        return obj;
    });
}

// FILTER
function renderFilter(){
    const kab = [...new Set(perusahaan.map(d=>d['Kabupaten/Kota']))];

    jQuery('#filter').append(`<option value="">ALL</option>`);
    kab.forEach(k=>{
        jQuery('#filter').append(`<option>${k}</option>`);
    });

    jQuery('#filter').on('change', ()=>{
        currentPage = 1;
        renderTable();
        renderChart();
    });
}

// TABLE
function renderTable(){
    let f = jQuery('#filter').val();
    let keyword = (jQuery('#search').val() || '').toLowerCase();

    let data = perusahaan.filter(d=>{
        return (!f || d['Kabupaten/Kota']==f) &&
        ((d['Nama Penyedia']||'').toLowerCase().includes(keyword) ||
         (d['Kode Penyedia']||'').toLowerCase().includes(keyword));
    });

    let start = (currentPage-1)*pageSize;
    let paged = data.slice(start, start+pageSize);

    let html = '';

    paged.forEach(d=>{
        html += `<tr>
        <td>
        <button onclick="detail('${d['Kode Penyedia']}')">Detail</button>
        <button onclick="lihatProyek('${d['Kode Penyedia']}')">Proyek</button>
        </td>
        <td>${d['Kabupaten/Kota']}</td>
        <td>${d['Status']}</td>
        <td>${d['Kode Penyedia']}</td>
        <td>${d['Nama Penyedia']}</td>
        </tr>`;
    });

    jQuery('#table tbody').html(html);
    renderPagination(data.length);
}

// PAGINATION
function renderPagination(total){
    let pages = Math.ceil(total/pageSize);
    let html = '';

    for(let i=1;i<=pages;i++){
        html += `<button onclick="goPage(${i})">${i}</button>`;
    }

    jQuery('#pagination').html(html);
}

function goPage(p){
    currentPage = p;
    renderTable();
}

// DETAIL
function detail(kode){
    let d = perusahaan.find(x=>x['Kode Penyedia']==kode);

    let html = `<h3>Detail Perusahaan</h3>`;

    Object.keys(d).forEach(k=>{
        html += `<p><b>${k}</b>: ${d[k]}</p>`;
    });

    showPopup(html);
}

// PROYEK
function lihatProyek(kode){
    let data = proyek.filter(p=>p['Kode Penyedia']==kode);

    let grouped = {};

    data.forEach(p=>{
        if(!grouped[p['Kode RUP']]) grouped[p['Kode RUP']] = [];
        grouped[p['Kode RUP']].push(p);
    });

    let html = `<h3>Daftar Proyek</h3>`;

    for(let k in grouped){
        html += `<h4>${k}</h4>`;
        grouped[k].forEach(p=>{
            html += `<p>${p['Nama Paket']} | Rp ${p['nilai_kontrak']}</p>`;
        });
    }

    showPopup(html);
}

// POPUP
function showPopup(html){
    jQuery('#popup-content').html(html + '<br><button onclick="closePopup()">Close</button>');
    jQuery('#popup').show();
}

function closePopup(){
    jQuery('#popup').hide();
}

// CHART
function renderChart(){
    let f = jQuery('#filter').val();

    let data = perusahaan.filter(d=>!f || d['Kabupaten/Kota']==f);

    let count = {};

    data.forEach(d=>{
        let k = d['Kabupaten/Kota'];
        count[k] = (count[k]||0)+1;
    });

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels: Object.keys(count),
            datasets: [{ data: Object.values(count) }]
        }
    });
}

// EXPORT
function exportExcel(){
    const data = perusahaan.map(d=>({
        Kabupaten: d['Kabupaten/Kota'],
        Status: d['Status'],
        Kode: d['Kode Penyedia'],
        Nama: d['Nama Penyedia']
    }));

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Data");
    XLSX.writeFile(wb, "perusahaan.xlsx");
}

</script>

</body>
</html>
