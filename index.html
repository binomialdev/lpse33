<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Monitoring Proyek</title>

<!-- PapaParse (biar CSV aman) -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
select, button { padding: 6px 10px; margin: 5px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ddd; padding: 8px; }
th { background: #f4f4f4; }
.pagination button { margin: 3px; }
.badge {
    background: #007bff;
    color: white;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>Monitoring Proyek</h2>

<select id="filterKab">
    <option value="">Semua Kab/Kota</option>
</select>

<table>
<thead>
<tr>
    <th>Nama Perusahaan</th>
    <th>Kab/Kota</th>
    <th>Aksi</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="pagination">
    <button onclick="firstPage()">First</button>
    <button onclick="prevPage()">Prev</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">Next</button>
    <button onclick="lastPage()">Last</button>
</div>

<script>
const SHEET_ID = "1H6HMmjpkiEzyuJBJhepfdRPoIW6pVQSBalZRdcVeTZg";

let perusahaanData = [];
let proyekData = [];

let filteredData = [];
let currentPage = 1;
let perPage = 10;


// ================= FETCH CSV (STABIL) =================
async function fetchCSV(sheet){
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${sheet}`;

    const res = await fetch(url);
    const text = await res.text();

    const parsed = Papa.parse(text, {
        header: true,
        skipEmptyLines: true
    });

    return parsed.data;
}


// ================= LOAD DATA =================
async function loadData(){
    let cache = localStorage.getItem('db_cache_csv');

    if(cache){
        let parsed = JSON.parse(cache);
        perusahaanData = parsed.perusahaan;
        proyekData = parsed.proyek;
    } else {
        perusahaanData = await fetchCSV('PERUSAHAAN');
        proyekData = await fetchCSV('PROYEK');

        localStorage.setItem('db_cache_csv', JSON.stringify({
            perusahaan: perusahaanData,
            proyek: proyekData
        }));
    }

    initFilter();
    applyFilter();
}


// ================= FILTER =================
function initFilter(){
    let setKab = new Set();

    perusahaanData.forEach(d => {
        let vals = Object.values(d);

        // kolom C = index 2
        let kab = vals[2] ? vals[2].toString().trim() : '';

        if(kab !== ''){
            setKab.add(kab);
        }
    });

    let arr = [...setKab].sort((a,b)=>a.localeCompare(b,'id'));

    let select = document.getElementById("filterKab");
    select.innerHTML = '<option value="">Semua Kab/Kota</option>';

    arr.forEach(k => {
        let opt = document.createElement("option");
        opt.value = k;
        opt.textContent = k;
        select.appendChild(opt);
    });
}

document.getElementById("filterKab").addEventListener("change", applyFilter);


// ================= APPLY FILTER =================
function applyFilter(){
    let selected = document.getElementById("filterKab").value;

    filteredData = perusahaanData.filter(d => {
        let vals = Object.values(d);
        let kab = vals[2] ? vals[2].toString().trim() : '';
        return selected === "" || kab === selected;
    });

    currentPage = 1;
    renderTable();
}


// ================= RENDER =================
function renderTable(){
    let start = (currentPage - 1) * perPage;
    let end = start + perPage;

    let pageData = filteredData.slice(start, end);

    let html = '';

    pageData.forEach(d => {
        let vals = Object.values(d);

        let nama = vals[1] || '-';
        let kab = vals[2] || '-';

        html += `
        <tr>
            <td>${nama}</td>
            <td>${kab}</td>
            <td><span class="badge" onclick="showDetail('${nama}')">Detail</span></td>
        </tr>
        `;
    });

    document.getElementById("tableBody").innerHTML = html;

    let totalPage = Math.ceil(filteredData.length / perPage) || 1;
    document.getElementById("pageInfo").innerText = `Page ${currentPage} / ${totalPage}`;
}


// ================= PAGINATION =================
function nextPage(){
    let total = Math.ceil(filteredData.length / perPage);
    if(currentPage < total){
        currentPage++;
        renderTable();
    }
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        renderTable();
    }
}

function firstPage(){
    currentPage = 1;
    renderTable();
}

function lastPage(){
    currentPage = Math.ceil(filteredData.length / perPage);
    renderTable();
}


// ================= DETAIL =================
function showDetail(nama){
    let list = proyekData.filter(p => JSON.stringify(p).includes(nama));
    alert("Jumlah proyek: " + list.length);
}


// ================= INIT =================
loadData();

</script>

</body>
</html>
