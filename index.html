<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Konstruksi PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { font-family: 'Segoe UI'; margin:0; background:#f1f5f9 }
.container { padding:20px }

.card {
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05)
}

h2 { margin-bottom:10px }

input, select {
    padding:8px;
    border-radius:8px;
    border:1px solid #ddd;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover { background:#1d4ed8 }

table {
    width:100%;
    border-collapse: collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #eee;
}

.pagination button {
    margin:3px;
    background:#e2e8f0;
    color:black;
}

#modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
}

#modal-content {
    background:white;
    margin:50px auto;
    padding:20px;
    width:70%;
    border-radius:12px;
    max-height:80vh;
    overflow:auto;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Dashboard Konstruksi (PRO)</h2>

<div class="card">
<select id="filter"></select>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<input type="text" id="search" placeholder="Cari...">
<button onclick="exportExcel()">Export Excel</button>

<table>
<thead>
<tr>
<th>Aksi</th>
<th>Kab/Kota</th>
<th>Status</th>
<th>Kode</th>
<th>Nama</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="pagination" id="pagination"></div>
</div>

</div>

<div id="modal">
<div id="modal-content"></div>
</div>

<script>

let perusahaan=[], proyek=[];
let page=1, size=10, chart;

// INIT
window.onload = async ()=>{
    await loadData();
    initFilter();
    render();
};

// LOAD + CACHE
async function loadData(){
    if(localStorage.getItem('perusahaan')){
        perusahaan = JSON.parse(localStorage.getItem('perusahaan'));
        proyek = JSON.parse(localStorage.getItem('proyek'));
        return;
    }

    perusahaan = await fetchSheet('PERUSAHAAN');
    proyek = await fetchSheet('PROYEK');

    localStorage.setItem('perusahaan', JSON.stringify(perusahaan));
    localStorage.setItem('proyek', JSON.stringify(proyek));
}

// FETCH
async function fetchSheet(sheet){
    const url = `https://docs.google.com/spreadsheets/d/1H6HMmjpkiEzyuJBJhepfdRPoIW6pVQSBalZRdcVeTZg/gviz/tq?tqx=out:json&sheet=${sheet}`;
    const res = await fetch(url);
    const txt = await res.text();
    const json = JSON.parse(txt.substring(47).slice(0,-2));

    const cols = json.table.cols.map(c=>c.label);

    return json.table.rows.map(r=>{
        let o={};
        r.c.forEach((c,i)=>o[cols[i]]=c?c.v:'');
        return o;
    });
}

// FILTER
function initFilter(){
    const f = document.getElementById('filter');
    const kab = [...new Set(perusahaan.map(d=>d['Kabupaten/Kota']))];

    f.innerHTML = `<option value="">ALL</option>`;
    kab.forEach(k=>f.innerHTML+=`<option>${k}</option>`);

    f.onchange = ()=>{ page=1; render(); };
    document.getElementById('search').oninput = ()=>{ page=1; render(); };
}

// RENDER
function render(){
    renderTable();
    renderChart();
}

// TABLE
function renderTable(){
    const f = document.getElementById('filter').value;
    const q = document.getElementById('search').value.toLowerCase();

    let data = perusahaan.filter(d=>{
        return (!f||d['Kabupaten/Kota']==f) &&
        (d['Nama Penyedia']||'').toLowerCase().includes(q);
    });

    const start=(page-1)*size;
    const slice=data.slice(start,start+size);

    let html='';
    slice.forEach(d=>{
        html+=`
        <tr>
        <td>
        <button onclick="detail('${d['Kode Penyedia']}')">Detail</button>
        <button onclick="proj('${d['Kode Penyedia']}')">Proyek</button>
        </td>
        <td>${d['Kabupaten/Kota']}</td>
        <td>${d['Status']}</td>
        <td>${d['Kode Penyedia']}</td>
        <td>${d['Nama Penyedia']}</td>
        </tr>`;
    });

    document.getElementById('tbody').innerHTML=html;

    renderPage(data.length);
}

// PAGINATION
function renderPage(total){
    let pages=Math.ceil(total/size);
    let html='';

    for(let i=1;i<=pages;i++){
        html+=`<button onclick="go(${i})">${i}</button>`;
    }

    document.getElementById('pagination').innerHTML=html;
}

function go(p){ page=p; renderTable(); }

// DETAIL
function detail(k){
    let d=perusahaan.find(x=>x['Kode Penyedia']==k);
    let html='<h3>Detail</h3>';

    Object.keys(d).forEach(k=>{
        html+=`<p><b>${k}</b>: ${d[k]}</p>`;
    });

    show(html);
}

// PROYEK
function proj(k){
    let data=proyek.filter(p=>p['Kode Penyedia']==k);

    let html='<h3>Proyek</h3>';
    data.forEach(p=>{
        html+=`<p>${p['Nama Paket']} | Rp ${p['nilai_kontrak']}</p>`;
    });

    show(html);
}

// MODAL
function show(html){
    document.getElementById('modal-content').innerHTML =
        html + '<br><button onclick="closeM()">Close</button>';
    document.getElementById('modal').style.display='block';
}

function closeM(){
    document.getElementById('modal').style.display='none';
}

// CHART
function renderChart(){
    const f=document.getElementById('filter').value;
    let data=perusahaan.filter(d=>!f||d['Kabupaten/Kota']==f);

    let count={};
    data.forEach(d=>{
        let k=d['Kabupaten/Kota'];
        count[k]=(count[k]||0)+1;
    });

    if(chart) chart.destroy();

    chart=new Chart(document.getElementById('chart'),{
        type:'bar',
        data:{
            labels:Object.keys(count),
            datasets:[{data:Object.values(count)}]
        }
    });
}

// EXPORT
function exportExcel(){
    const ws=XLSX.utils.json_to_sheet(perusahaan);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Data");
    XLSX.writeFile(wb,"data.xlsx");
}

</script>

</body>
</html>
