<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Konstruksi PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f1f5f9 }
.container { padding:20px }

.card {
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05)
}

input, select {
    padding:8px;
    border-radius:8px;
    border:1px solid #ddd;
}

button {
    padding:6px 10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover { background:#1d4ed8 }

table { width:100%; border-collapse: collapse }
th, td { padding:10px; border-bottom:1px solid #eee }

.pagination button {
    margin:2px;
    background:#e2e8f0;
    color:black;
}

#modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
}

#modal-content {
    background:white;
    margin:40px auto;
    padding:20px;
    width:70%;
    border-radius:12px;
    max-height:80vh;
    overflow:auto;
    position:relative;
}

.close-btn {
    position:absolute;
    top:10px;
    left:10px;
    background:red;
}
</style>
</head>

<body>

<div class="container">

<h2>⚡ Dashboard Konstruksi (Fast Mode)</h2>

<div class="card">
<select id="filter"></select>
</div>

<div class="card">
<input type="text" id="search" placeholder="Cari...">
<button onclick="exportExcel()">Export Excel</button>

<table>
<thead>
<tr>
<th>Aksi</th>
<th>Kab/Kota</th>
<th>Kode</th>
<th>Nama</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="pagination" id="pagination"></div>
</div>

</div>

<div id="modal">
<div id="modal-content"></div>
</div>

<script>

let perusahaan=[], proyek=[];
let page=1, size=10;

const CACHE_KEY = "DATA_KONSTRUKSI_V1";

// INIT
window.onload = async ()=>{
    await loadData();
    initFilter();
    render();
};

// =====================
// ⚡ LOAD DATA (CACHE)
// =====================
async function loadData(){

    const cache = localStorage.getItem(CACHE_KEY);

    if(cache){
        console.log("⚡ Load dari cache");
        const parsed = JSON.parse(cache);
        perusahaan = parsed.perusahaan;
        proyek = parsed.proyek;
        return;
    }

    console.log("🌐 Fetch dari server");

    const [p1, p2] = await Promise.all([
        fetchSheet('PERUSAHAAN'),
        fetchSheet('PROYEK')
    ]);

    perusahaan = cleanData(p1);
    proyek = p2;

    // simpan cache
    localStorage.setItem(CACHE_KEY, JSON.stringify({perusahaan, proyek}));
}

// =====================
// ⚡ CSV PARSER CEPAT
// =====================
function parseCSV(text){
    const rows = text.split('\n');
    return rows.map(row=>{
        const result=[];
        let current='', inQuotes=false;

        for(let i=0;i<row.length;i++){
            const char=row[i];

            if(char === '"'){
                inQuotes=!inQuotes;
            }else if(char===',' && !inQuotes){
                result.push(current);
                current='';
            }else{
                current+=char;
            }
        }
        result.push(current);
        return result;
    });
}

// FETCH
async function fetchSheet(sheet){
    const url = `https://docs.google.com/spreadsheets/d/1H6HMmjpkiEzyuJBJhepfdRPoIW6pVQSBalZRdcVeTZg/export?format=csv&sheet=${sheet}`;
    
    const res = await fetch(url);
    const text = await res.text();

    const rows = parseCSV(text);
    const headers = rows[0];

    return rows.slice(1).map(r=>{
        let obj={};
        headers.forEach((h,i)=>obj[h]=r[i]||'');
        return obj;
    });
}

// =====================
// ⚡ CLEAN DATA SEKALI
// =====================
function cleanData(data){
    return data.map(d=>{
        const keys = Object.keys(d);

        let kab = d[keys[2]] || '';

        kab = kab
            .replace(/\u00A0/g,' ')
            .replace(/\s+/g,' ')
            .trim();

        if(!kab) kab='-';

        d['Kabupaten/Kota'] = kab;

        return d;
    });
}

// =====================
// FILTER
// =====================
function initFilter(){
    const f = document.getElementById('filter');

    let kab = [...new Set(perusahaan.map(d=>d['Kabupaten/Kota']))];

    kab.sort((a,b)=> a.localeCompare(b,'id',{sensitivity:'base'}));

    f.innerHTML = `<option value="">ALL</option>`;
    kab.forEach(k=>f.innerHTML+=`<option>${k}</option>`);

    f.onchange = ()=>{ page=1; render(); };
    document.getElementById('search').oninput = ()=>{ page=1; render(); };
}

// =====================
// RENDER
// =====================
function render(){
    renderTable();
}

// TABLE
function renderTable(){
    const f = document.getElementById('filter').value;
    const q = document.getElementById('search').value.toLowerCase();

    let data = perusahaan.filter(d=>{
        return (!f||d['Kabupaten/Kota']==f) &&
        (d['Nama Penyedia']||'').toLowerCase().includes(q);
    });

    const start=(page-1)*size;
    const slice=data.slice(start,start+size);

    let html='';
    slice.forEach(d=>{
        html+=`
        <tr>
        <td>
        <button onclick="detail('${d['Kode Penyedia']}')">Detail</button>
        <button onclick="proj('${d['Kode Penyedia']}')">Proyek</button>
        </td>
        <td>${d['Kabupaten/Kota']}</td>
        <td>${d['Kode Penyedia']}</td>
        <td>${d['Nama Penyedia']}</td>
        </tr>`;
    });

    document.getElementById('tbody').innerHTML=html;

    renderPagination(data.length);
}

// PAGINATION
function renderPagination(total){
    let totalPages = Math.ceil(total/size);
    let html='';

    html += `<button onclick="go(1)">First</button>`;
    html += `<button onclick="go(${page-1})">Prev</button>`;

    for(let i=Math.max(1,page-2); i<=Math.min(totalPages,page+2); i++){
        html += `<button onclick="go(${i})">${i}</button>`;
    }

    html += `<button onclick="go(${page+1})">Next</button>`;
    html += `<button onclick="go(${totalPages})">Last</button>`;

    document.getElementById('pagination').innerHTML=html;
}

function go(p){
    if(p<1) return;
    page=p;
    renderTable();
}

// DETAIL
function detail(k){
    let d = perusahaan.find(x=>x['Kode Penyedia']==k);
    let html = `<button class="close-btn" onclick="closeM()">X</button>`;
    html += `<h3>Detail Penyedia</h3>`;

    Object.keys(d).forEach(key=>{
        html += `<p><b>${key}</b>: ${d[key]}</p>`;
    });

    show(html);
}

// PROYEK
function proj(k){
    let data = proyek.filter(p=>
        (p['Kode Penyedia']||p['kode_penyedia'])==k
    );

    let html = `<button class="close-btn" onclick="closeM()">X</button>`;
    html += `<h3>Daftar Proyek</h3>`;

    if(!data.length) html += `<p>Tidak ada proyek</p>`;

    data.forEach(p=>{
        html += `<p>
        ${p['Nama Paket']||p['nama_paket']||'-'}
        | Rp ${p['nilai_kontrak']||p['Nilai Kontrak']||0}
        </p>`;
    });

    show(html);
}

// MODAL
function show(html){
    document.getElementById('modal-content').innerHTML=html;
    document.getElementById('modal').style.display='block';
}

function closeM(){
    document.getElementById('modal').style.display='none';
}

// EXPORT
function exportExcel(){
    const ws = XLSX.utils.json_to_sheet(perusahaan);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Data");
    XLSX.writeFile(wb, "data.xlsx");
}

</script>

</body>
</html>
