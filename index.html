<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Monitoring Proyek</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
}

select, button {
    padding: 6px 10px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
}

th {
    background: #f4f4f4;
}

.pagination button {
    margin: 3px;
}

.badge {
    background: #007bff;
    color: white;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>Monitoring Proyek</h2>

<select id="filterKab">
    <option value="">Semua Kab/Kota</option>
</select>

<table>
<thead>
<tr>
    <th>Nama Perusahaan</th>
    <th>Kab/Kota</th>
    <th>Aksi</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="pagination">
    <button onclick="firstPage()">First</button>
    <button onclick="prevPage()">Prev</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">Next</button>
    <button onclick="lastPage()">Last</button>
</div>

<script>
const SHEET_ID = "1H6HMmjpkiEzyuJBJhepfdRPoIW6pVQSBalZRdcVeTZg";

let perusahaanData = [];
let proyekData = [];

let currentPage = 1;
let perPage = 10;
let filteredData = [];


// ================= FETCH API SUPER CEPAT =================
async function fetchSheet(sheetName){
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
    
    const res = await fetch(url);
    let text = await res.text();

    const json = JSON.parse(text.substring(47).slice(0, -2));

    const rows = json.table.rows;
    const cols = json.table.cols.map(c => c.label);

    return rows.map(r => {
        let obj = {};
        r.c.forEach((cell, i) => {
            obj[cols[i]] = cell ? cell.v : '';
        });
        return obj;
    });
}


// ================= LOAD DATA =================
async function loadData(){
    let cache = localStorage.getItem('db_cache_v3');

    if(cache){
        let parsed = JSON.parse(cache);
        perusahaanData = parsed.perusahaan;
        proyekData = parsed.proyek;
    } else {
        perusahaanData = await fetchSheet('PERUSAHAAN');
        proyekData = await fetchSheet('PROYEK');

        localStorage.setItem('db_cache_v3', JSON.stringify({
            perusahaan: perusahaanData,
            proyek: proyekData
        }));
    }

    initFilter();
    applyFilter();
}


// ================= FILTER =================
function initFilter(){
    let setKab = new Set();

    perusahaanData.forEach(d => {
        let values = Object.values(d);
        let kab = values[2] || '';

        if(kab && kab.toString().trim() !== ''){
            setKab.add(kab.toString().trim());
        }
    });

    let arr = [...setKab].sort((a,b)=>a.localeCompare(b,'id'));

    let select = document.getElementById("filterKab");
    select.innerHTML = '<option value="">Semua Kab/Kota</option>';

    arr.forEach(k => {
        let opt = document.createElement("option");
        opt.value = k;
        opt.textContent = k;
        select.appendChild(opt);
    });
}

document.getElementById("filterKab").addEventListener("change", applyFilter);


// ================= APPLY FILTER =================
function applyFilter(){
    let selected = document.getElementById("filterKab").value;

    filteredData = perusahaanData.filter(d => {
        let values = Object.values(d);
        let kab = values[2] || '';
        return selected === "" || kab === selected;
    });

    currentPage = 1;
    renderTable();
}


// ================= RENDER TABLE =================
function renderTable(){
    let start = (currentPage - 1) * perPage;
    let end = start + perPage;

    let data = filteredData.slice(start, end);

    let html = '';

    data.forEach(d => {
        let values = Object.values(d);

        let nama = values[1] || '-';
        let kab = values[2] || '-';

        html += `
        <tr>
            <td>${nama}</td>
            <td>${kab}</td>
            <td><span class="badge" onclick="showDetail('${nama}')">Detail</span></td>
        </tr>
        `;
    });

    document.getElementById("tableBody").innerHTML = html;

    let totalPage = Math.ceil(filteredData.length / perPage);
    document.getElementById("pageInfo").innerText = `Page ${currentPage} / ${totalPage}`;
}


// ================= PAGINATION =================
function nextPage(){
    let totalPage = Math.ceil(filteredData.length / perPage);
    if(currentPage < totalPage){
        currentPage++;
        renderTable();
    }
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        renderTable();
    }
}

function firstPage(){
    currentPage = 1;
    renderTable();
}

function lastPage(){
    currentPage = Math.ceil(filteredData.length / perPage);
    renderTable();
}


// ================= DETAIL =================
function showDetail(nama){
    let proyek = proyekData.filter(p => {
        return JSON.stringify(p).includes(nama);
    });

    alert("Jumlah proyek: " + proyek.length);
}


// ================= INIT =================
loadData();

</script>

</body>
</html>
